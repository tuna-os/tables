name: Publish Flatpak

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-oci:
    name: Build Flatpak OCI
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Setup suite-common subproject
        run: |
          rm -rf subprojects/suite-common && mkdir -p subprojects
          git clone --depth 1 https://github.com/hanthor/suite-common.git subprojects/suite-common
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: org.tunaos.tables.json
          cache-key: flatpak-builder-${{ github.sha }}
          build-bundle: false
          upload-artifact: false
      - name: Export OCI
        run: |
          flatpak build-bundle --oci --arch=x86_64 repo tables.oci org.tunaos.tables
      - name: Upload OCI artifact
        uses: actions/upload-artifact@v4
        with:
          name: tables-oci
          path: tables.oci/
          retention-days: 1

  publish:
    name: Publish to GHCR
    needs: build-oci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: tables-oci
          path: tables.oci
      - name: Push OCI to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          skopeo copy oci:tables.oci docker://ghcr.io/tuna-os/tables:latest
          TAG="${{ github.ref_name }}"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            skopeo copy oci:tables.oci docker://ghcr.io/tuna-os/tables:${TAG}
          fi
      - name: Update central index (tuna-os/docs)
        run: |
          # Clone the docs repo
          git clone --depth 1 https://x-access-token:${{ secrets.FLATPAK_INDEX_TOKEN }}@github.com/tuna-os/docs.git index-repo
          # Run update-index to update index/static
          pip install requests  # may be needed for update-index dependencies
          python3 .github/scripts/update-index.py \
            --oci-dir tables.oci \
            --index-file index-repo/static/flatpak/index/static \
            --repo-name hanthor/tables \
            --tags latest
          # Commit and push
          cd index-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/flatpak/index/static
          if git diff --cached --quiet; then
            echo "No index changes"
          else
            git commit -m "chore(flatpak): update Tables OCI index [${{ github.ref_name }}]"
            git push origin main
          fi
